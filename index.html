<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Система реєстрації</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: -apple-system, sans-serif; 
            background: #f0f2f5; 
        }
        #app { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; text-align: center; 
            transition: background 0.5s ease; 
        }
        /* МЕМ-РЕЖИМ (Фон) */
        body.bg-error {
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
    background-color: black;
        }
        body.bg-error #app { background: transparent !important; }
        /* ТЕКСТ МЕМУ */
        .meme-text {
            display: none; position: fixed; width: 100%; text-align: center; 
            color: white; font-weight: 900; font-size: 2.8rem; font-family: Impact, sans-serif;
            text-transform: uppercase; z-index: 10; pointer-events: none;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        .text-top { top: 10%; }
        .text-bottom { bottom: 10%; }
        body.bg-error .meme-text { display: block; }
        /* КАРТКА */
        .card { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; 
            max-width: 380px; color: #333; z-index: 5; transition: 0.3s;
        }
        /* ПРОЗОРА КАРТКА ПРИ ПОМИЛЦІ */
        body.bg-error .card { background: transparent !important; box-shadow: none !important; border: none !important; }
        body.bg-error .card h2, body.bg-error .card p { color: white !important; text-shadow: 2px 2px 0 #000; }
        body.bg-error .card h2 { display: none; }
        .btn { 
            background: #007bff; color: white; border: none; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1rem; 
        }
        body.bg-error .btn { border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.8); margin-top: 20px; }
        /* ПОВНОЕКРАННИЙ IFRAME */
        #formFrame {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; border: none; 
            margin: 0; padding: 0; z-index: 9999; background: white;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="meme-text text-top">ТИ КУДИ ЛІЗЕШ?</div>
    <div class="meme-text text-bottom">ТУЛИ В АДМІН</div>
    <div id="app">
        <div class="card" id="mainCard">
            <h2 id="title">Реєстрація</h2>
            <p id="status">Доступ дозволено тільки зі смартфонів</p>
            <button id="startBtn" class="btn" onclick="secureCheck()">Почати реєстрацію</button>
        </div>
    </div>

    <iframe id="formFrame" src=""></iframe>

    <script>
        const _0xDat = {
            u: "aHR0cHM6Ly90YWxseS5zby9yL3p4N1pvMA==",
            la: 49.55200696012323, 
            lo: 25.590611099968683,
            r: 30  
        };

        /* РАНДОМАЙЗЕР МЕМІВ */
        const memes = [
          "brown.jpg",
            "david.jpg",
            "dog.jpg",
            "geo.jpg",
            "glass.jpg",
            "judge.jpg",
            "judge2.jpg",
            "judge2.jpg",
            "litledog.jpg",
            "phatearl.gif",
            "rock.jpg",
            "why.png",
            "горила.png"
        ];

        function showErrorBg() {
            const pick = memes[Math.floor(Math.random() * memes.length)];
            document.body.style.backgroundImage = `url("${pick}")`;
            document.body.classList.add('bg-error');
        }

        /* 1. ЗАХИСТ ВІД DEVTOOLS (F12) */
        setInterval(function() { (function() {}.constructor("debugger")()); }, 50);
        
        window.onresize = function() {
            if ((window.outerHeight - window.innerHeight) > 150 || (window.outerWidth - window.innerWidth) > 150) {
                document.body.innerHTML = "<div style='color:white;text-align:center;margin-top:20%;font-size:2rem;'>SYSTEM ERROR: DEVTOOLS DETECTED</div>";
            }
        };

        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };

        /* 2. ГОЛОВНА ПЕРЕВІРКА */
        function secureCheck() {
            const status = document.getElementById('status');
            const btn = document.getElementById('startBtn');

            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (!isMobile) {
                status.innerHTML = "<b style='color:red'>ПОМИЛКА: Тільки з мобільних пристроїв!</b>";
                return;
            }

            btn.style.display = 'none';
            status.innerText = "Зчитування GPS...";

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const dist = (function(l1, n1, l2, n2) {
                        const R = 6371e3;
                        const dL = (l2 - l1) * Math.PI / 180;
                        const dN = (n2 - n1) * Math.PI / 180;
                        const a = Math.sin(dL/2) * Math.sin(dL/2) + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);
                        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    })(pos.coords.latitude, pos.coords.longitude, _0xDat.la, _0xDat.lo);
                    
                    if (dist <= _0xDat.r) {
                        document.getElementById('app').style.display = 'none';
                        const f = document.getElementById('formFrame');
                        f.src = atob(_0xDat.u);
                        f.style.display = 'block';
                    } else {
                        // ПОМИЛКА: рандомний мем
                        showErrorBg();
                        status.innerHTML = "<b style='color:#ff4d4d'>ПОМИЛКА ДОСТУПУ</b><br>Ти за межами будівлі (" + Math.round(dist) + "м).";
                        btn.style.display = 'inline-block';
                        btn.innerText = "Спробувати ще раз";
                    }
                },
                (err) => { 
                    status.innerHTML = "<b style='color:red'>Увімкни GPS в браузері!</b>"; 
                    btn.style.display = 'inline-block'; 
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
    </script>
</body>
</html>
