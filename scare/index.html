<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Системне оновлення...</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            height: 100%; margin: 0; padding: 0; 
            background-color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; cursor: pointer;
        }

        /* --- ЕКРАН ПЕРЕЗАПУСКУ --- */
        #restart-screen {
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; background-color: #000;
        }

        /* Анімація для Apple: Плавне пульсування логотипу */
        .apple-boot {
            width: 80px;
            filter: brightness(0) invert(1);
            animation: applePulse 3s infinite ease-in-out;
        }

        @keyframes applePulse {
            0% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(0.98); }
        }

        /* Анімація для Android */
        .android-load { color: white; text-align: center; }
        .android-logo { font-size: 2.5rem; font-weight: 500; margin-bottom: 15px; opacity: 0.8; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff; border-radius: 50%;
            margin: 0 auto; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- ВІКНО ПОВІДОМЛЕННЯ --- */
        #final-screen {
            display: none; height: 100%; width: 100%;
            background-color: #3c8ccf; justify-content: center; align-items: center;
        }

        #message-box {
            background: white; padding: 40px 30px; border-radius: 24px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 90%; max-width: 500px; animation: fadeIn 0.5s ease;
        }

        h2 { color: #e74c3c; margin-top: 0; font-size: 1.8rem; }
        .time-label { font-size: 1.1rem; color: #666; margin-top: 15px; }

        .clock-row {
            display: flex; justify-content: center; align-items: center;
            gap: 15px; margin-top: 5px; color: #e74c3c; font-family: monospace;
        }
        .time-main { font-size: 2.2rem; font-weight: 600; }
        .time-seconds {
            font-size: 4rem; font-weight: 900;
            display: inline-block; min-width: 85px;
            animation: pulseScale 1s infinite alternate;
        }

        @keyframes fastZoom {
            0% { transform: scale(0.3); opacity: 0; }
            30% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="toggleFullscreen()">

    <div id="restart-screen">
        <div id="os-content"></div>
    </div>

    <div id="final-screen">
        <div id="message-box">
            <h2>Реєстрація закрита</h2>
            <p>Доступно лише з 9:00 до 10:00</p>
            
            <div class="time-label">Зараз на годиннику:</div>
            <div class="clock-row">
                <div class="time-main" id="time-h-m">00:00:</div>
                <div class="time-seconds" id="time-s">00</div>
            </div>
        </div>
    </div>

    <script>
        let lastSecond = -1;

        function toggleFullscreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }

        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds();
            const s_str = s.toString().padStart(2, '0');

            document.getElementById('time-h-m').innerHTML = `${h}:${m}:`;
            
            if (s !== lastSecond) {
                lastSecond = s;
                const s_elem = document.getElementById('time-s');
                s_elem.innerHTML = s_str;
                
                // Перезапуск анімації
                s_elem.style.animation = 'none';
                s_elem.offsetHeight; 
                s_elem.style.animation = null;
            }
        }

        function init() {
            const now = new Date();
            const hour = now.getHours();
            if (hour >= 9 && hour < 10) {
                window.location.replace("https://vipmed.github.io/reg/");
                return;
            }

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const content = document.getElementById('os-content');

            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                // Анімований логотип Apple
                content.innerHTML = '<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="apple-boot">';
            } else {
                // Анімований Android (Google)
                content.innerHTML = `
                    <div class="android-load">
                        <div class="android-logo">Google</div>
                        <div class="spinner"></div>
                    </div>`;
            }

            setTimeout(() => {
                document.getElementById('restart-screen').style.display = 'none';
                document.getElementById('final-screen').style.display = 'flex';
                document.body.style.backgroundColor = '#3c8ccf';
                setInterval(updateClock, 100);
            }, 8000); // 4 секунди "завантаження"
        }

        window.onload = init;
    </script>
</body>
</html>
