<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ обмежено</title>
    <style>
        /* Базові стилі та центрування */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            background-color: #f4f4f9;
            overflow: hidden;
        }

        /* "Похмурий" режим, коли зачинено */
        body.closed-mode {
            background-color: #121212;
            color: #e0e0e0;
        }

        #message {
            text-align: center;
            padding: 40px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            transition: all 0.5s ease;
        }

        body.closed-mode #message {
            background: #1e1e1e;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            border: 1px solid #333;
        }

        h2 { color: #e74c3c; margin-top: 0; }
        p { font-size: 1.1rem; line-height: 1.6; }

        /* Анімація мигання червоним */
        @keyframes blinkRed {
            0% { color: #777; }
            50% { color: #ff0000; text-shadow: 0 0 15px rgba(255, 0, 0, 0.7); }
            100% { color: #777; }
        }

        .passive-aggressive-clock {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed #444;
        }

        .time-wrapper {
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            animation: blinkRed 1s infinite;
        }

        .seconds {
            font-size: 4rem; /* ДУЖЕ великі секунди */
            font-weight: 900;
            display: inline-block;
            min-width: 80px;
            line-height: 1;
        }

        .subtext {
            display: block;
            font-size: 0.85rem;
            color: #888;
            font-style: italic;
            margin-top: 15px;
            line-height: 1.4;
        }

        .click-hint {
            margin-top: 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="message">
        Зачекайте, ми перевіряємо, чи маєте ви право бути тут...
    </div>

    <script>
        // --- КОНФІГУРАЦІЯ ---
        const START_HOUR = 9;
        const END_HOUR = 10;
        const FORM_URL = "https://vipmed.github.io/reg/"; // ЗАМІНІТЬ НА СВОЄ ПОСИЛАННЯ

        let audioCtx;
        let soundEnabled = false;

        // Функція генерації звуку "тік"
        function playTick() {
            if (!soundEnabled) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'square'; 
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function update() {
            const now = new Date();
            const hour = now.getHours();
            const min = now.getMinutes().toString().padStart(2, '0');
            const sec = now.getSeconds().toString().padStart(2, '0');

            if (hour >= START_HOUR && hour < END_HOUR) {
                // ПЕРЕНАПРАВЛЕННЯ
                window.location.replace(FORM_URL);
            } else {
                // ПАСИВНА АГРЕСІЯ
                document.body.classList.add('closed-mode');
                document.getElementById('message').innerHTML = `
                    <h2>Реєстрація закрита.</h2>
                    <p>Взагалі-то, зараз не робочий час. Спробуйте зайти між <b>${START_HOUR}:00</b> та <b>${END_HOUR}:00</b>.</p>
                    
                    <div class="passive-aggressive-clock">
                        <div class="time-wrapper">
                            ${hour}:${min}:<span class="seconds">${sec}</span>
                        </div>
                        <span class="subtext">
                            Секунди невблаганно йдуть, а форма все ще не працює. <br>
                            Дивно, правда? Можливо, ще через пару годин очікування щось зміниться...
                        </span>
                        <div class="click-hint" id="hint">Клацніть будь-де для "атмосфери"</div>
                    </div>
                `;
                playTick();
            }
        }

        // Включення звуку після першої взаємодії
        window.addEventListener('click', () => {
            soundEnabled = true;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            const hint = document.getElementById('hint');
            if (hint) hint.innerHTML = "Слухайте, як марнується ваш час...";
        }, { once: true });

        // Запуск
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
