<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевірка доступу</title>
    <style>
        /* Базові стилі для адаптивності на весь екран */
        * { box-sizing: border-box; }
        
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #3c8ccf; /* Твій колір фону */
            color: #333;
            overflow: hidden;
            cursor: pointer; /* Щоб було зрозуміло, що можна клікнути */
        }

        #message {
            text-align: center;
            padding: 40px 30px;
            border-radius: 24px;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            width: 90%;
            max-width: 70%;
            transition: all 0.3s ease;
        }

        h2 { color: #e74c3c; margin-top: 0; font-size: 2rem; }
        p { font-size: 1.15rem; line-height: 1.6; margin: 15px 0; }

        /* Горизонтальний контейнер для годинника */
        .clock-row {
            display: flex;
            flex-direction: row; 
            justify-content: center;
            align-items: center; 
            gap: 15px;
            margin-top: 25px;
            font-family: monospace;
            /* ЗМІНА: Повне світіння блоку */
            padding: 10px;
            border-radius: 15px;
            animation: glowEffect 1.5s infinite alternate;
        }

        /* Анімація світіння */
        @keyframes glowEffect {
            from { box-shadow: 0 0 10px rgba(231, 76, 60, 0.2); }
            to { box-shadow: 0 0 30px rgba(231, 76, 60, 0.6); }
        }

        .time-label {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 5px;
        }

        .time-main {
            font-size: 2rem; 
            color: #444;
            font-weight: 600;
        }

        .time-seconds {
            font-size: 4rem; 
            font-weight: 900;
            color: #e74c3c;
            line-height: 1;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; transform: scale(1.02); }
            100% { opacity: 1; }
        }
    </style>
</head>
<body onclick="soundStarted = true; if (audioCtx) audioCtx.resume();">

    <div id="message">
        Зачекайте, перевіряємо час доступу...
    </div>

    <script>
        let audioCtx;
        let soundStarted = false;

        function playHeavyTick() {
            if (!soundStarted) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'square';
            osc.frequency.setValueAtTime(160, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        function checkAccess() {
            const now = new Date();
            const hour = now.getHours();
            const min = now.getMinutes().toString().padStart(2, '0');
            const sec = now.getSeconds().toString().padStart(2, '0');

            const startHour = 9;
            const endHour = 10;
            const formUrl = "https://vipmed.github.io/reg/";

            if (hour >= startHour && hour < endHour) {
                window.location.replace(formUrl);
            } else {
                document.getElementById('message').innerHTML = `
                    <h2>Реєстрація закрита</h2>
                    <p>Реєстраційна форма доступна лише:<br>
                    <strong>з ${startHour}:00 до ${endHour}:00</strong>.</p>
                    
                    <div class="time-label">Зараз на годиннику:</div>
                    <div class="clock-row">
                        <div class="time-main">${hour}:${min}</div>
                        <div class="time-seconds">${sec}</div>
                    </div>
                `;
                playHeavyTick();
            }
        }

        setInterval(checkAccess, 1000);
        checkAccess();
    </script>
</body>
</html>
