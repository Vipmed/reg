<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевірка доступу</title>
    <style>
        /* Стилі для повного центрування */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center; /* Центрування по горизонталі */
            align-items: center;     /* Центрування по вертикалі */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #3c8ccf;
            color: #333;
        }

        #message {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 80%;
        }

        h2 { color: #e74c3c; margin-top: 0; }
        p { font-size: 1.1rem; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="message">
        Зачекайте, перевіряємо час доступу...
    </div>

    <script>
        function checkAccess() {
            const now = new Date();
            const hour = now.getHours();

            const startHour = 9;
            const endHour = 10;
            const formUrl = "https://vipmed.github.io/reg/";

            if (hour >= startHour && hour < endHour) {
                window.location.replace(formUrl);
            } else {
                // Виводимо повідомлення, якщо час не підходить
                document.getElementById('message').innerHTML = `
                    <h2>Реєстрація закрита</h2>
                    <p>Вибачте, але реєстраційна форма доступна лише у робочий час:<br>
                    <strong>з ${startHour}:00 до ${endHour}:00</strong>.</p>
                    <p style="font-size: 0.9rem; color: #777;">Зараз на годиннику: ${hour}:${now.getMinutes().toString().padStart(2, '0')}</p>
                `;
            }
        }

        checkAccess();
    </script>
</body>
</html>
