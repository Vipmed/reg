<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевірка доступу</title>
    <style>
        /* Базові стилі */
        * { box-sizing: border-box; }
        
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #3c8ccf; 
            color: #333;
            overflow: hidden;
            cursor: pointer;
        }

        #message {
            text-align: center;
            padding: 40px 30px;
            border-radius: 24px;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            width: 90%;
            max-width: 550px;
            transition: all 0.3s ease;
        }

        h2 { color: #e74c3c; margin-top: 0; font-size: 2rem; }
        p { font-size: 1.15rem; line-height: 1.6; margin: 15px 0; }

        .clock-row {
            display: flex;
            flex-direction: row; 
            justify-content: center;
            align-items: center; 
            gap: 20px;
            margin-top: 25px;
            font-family: monospace;
        }

        .time-label {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 5px;
        }

        .time-main {
            font-size: 2.2rem; 
            color: #e74c3c;
            font-weight: 600;
        }

        /* Секунди: тільки пульсація розміру, без неону */
        .time-seconds {
            display: inline-block;
            font-size: 4rem; 
            font-weight: 900;
            color: #e74c3c;
            line-height: 1;
            animation: pulseScale 1s infinite alternate;
        }

        /* Анімація тільки для зміни розміру */
        @keyframes pulseScale {
            from { 
                transform: scale(0.85);
            }
            to { 
                transform: scale(1.1);
            }
        }
    </style>
</head>
<body onclick="startAudio()">

    <div id="message">
        Зачекайте, перевіряємо час доступу...
    </div>

    <script>
        function checkAccess() {
            const now = new Date();
            const hour = now.getHours();
            const min = now.getMinutes().toString().padStart(2, '0');
            const sec = now.getSeconds().toString().padStart(2, '0');

            const startHour = 9;
            const endHour = 10;
            const formUrl = "https://vipmed.github.io/reg/";

            if (hour >= startHour && hour < endHour) {
                window.location.replace(formUrl);
            } else {
                document.getElementById('message').innerHTML = `
                    <h2>Реєстрація закрита</h2>
                    <p>Реєстраційна форма доступна лише:<br>
                    <strong>з ${startHour}:00 до ${endHour}:00</strong>.</p>
                    
                    <div class="time-label">Зараз на годиннику:</div>
                    <div class="clock-row">
                        <div class="time-main">${hour}:${min}:</div>
                        <div class="time-seconds">${sec}</div>
                    </div>
                `;
                playHeavyTick();
            }
        }

        setInterval(checkAccess, 1000);
        checkAccess();
    </script>
</body>
</html>
